<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hackathon Idea Scorer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1>Hackathon Idea Scorer</h1>
    <p>Enter a project idea and get a quick score.</p>

    <textarea id="ideaInput" placeholder="Example: AI assistant that summarizes meeting notes..."></textarea>

    <button id="scoreButton">Score Idea</button>

    <section id="result" class="result hidden"></section>
  </main>

  <script src="script.js"></script>
</body>
</html>
